name: Update AI Daily

on:
  schedule:
    # 22:00 UTC == 06:00 next day at UTC+8 (Asia/Shanghai)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and curate news
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily news update $(date -u +%Y-%m-%d)"
            git push
          fi
